<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    overflow-x:hidden;
}

nav{
    width:100%;
    background:#000;
    padding:15px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:999;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    font-size:16px;
}

header{
    padding:60px 20px;
    text-align:center;
}

header img{
    width:100%;
    max-width:700px;
    height:auto;
}

p{
    font-size:20px;
    margin-top:20px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:red;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
}

section{
    padding:50px 20px;
}

h2{
    text-align:center;
    margin-bottom:30px;
    font-size:35px;
}

.gallery{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

.gallery img{
    width:100%;
    border-radius:15px;
}

.contact{
    text-align:center;
    line-height:2;
}

footer{
    background:#000;
    text-align:center;
    padding:20px;
}

@media(min-width:768px){

.gallery{
    grid-template-columns:repeat(3,1fr);
}

nav a{
    margin:0 20px;
}

}

</style>
